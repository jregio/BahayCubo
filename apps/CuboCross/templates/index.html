<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cubo Cross</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.svg') }}?v={{ static_v.favicon }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="{{ url_for('cubocross.static', filename='style.css') }}?v={{ static_v.css }}" />
</head>
<body>

<!-- ── Loading screen ────────────────────────────────────────────── -->
<div id="loading-screen" class="loading-screen">
  <div class="loading-title">Cubo Cross</div>
  <div class="loading-subtitle" id="loading-subtitle">Loading pruning tables…</div>
  <div class="loading-cards">

    <div class="lcard" id="lcard-cross">
      <div class="lcard-dots"><span class="lcard-dot" style="background:#e8e8f0"></span></div>
      <div class="lcard-label">Cross</div>
      <div class="lcard-status" id="lstatus-cross">Loading…</div>
    </div>

    <div class="lcard" id="lcard-red_blue">
      <div class="lcard-dots">
        <span class="lcard-dot" style="background:#1565c0"></span>
        <span class="lcard-dot" style="background:#c62828"></span>
      </div>
      <div class="lcard-label">BR</div>
      <div class="lcard-status" id="lstatus-red_blue">Loading…</div>
    </div>

    <div class="lcard" id="lcard-red_green">
      <div class="lcard-dots">
        <span class="lcard-dot" style="background:#c62828"></span>
        <span class="lcard-dot" style="background:#2e7d32"></span>
      </div>
      <div class="lcard-label">RG</div>
      <div class="lcard-status" id="lstatus-red_green">Loading…</div>
    </div>

    <div class="lcard" id="lcard-orange_green">
      <div class="lcard-dots">
        <span class="lcard-dot" style="background:#2e7d32"></span>
        <span class="lcard-dot" style="background:#ef6c00"></span>
      </div>
      <div class="lcard-label">GO</div>
      <div class="lcard-status" id="lstatus-orange_green">Loading…</div>
    </div>

    <div class="lcard" id="lcard-orange_blue">
      <div class="lcard-dots">
        <span class="lcard-dot" style="background:#ef6c00"></span>
        <span class="lcard-dot" style="background:#1565c0"></span>
      </div>
      <div class="lcard-label">OB</div>
      <div class="lcard-status" id="lstatus-orange_blue">Loading…</div>
    </div>

  </div>
</div><!-- #loading-screen -->

<!-- ── Main app (hidden until ready) ────────────────────────────── -->
<div id="app-wrap" class="app-wrap hidden">

  <header class="app-header">
    <div class="app-brand" aria-label="Bahay Cubo">
      <div class="app-brand-mark">
        <img class="app-brand-logo" src="{{ url_for('static', filename='favicon.svg') }}?v={{ static_v.favicon }}" width="44" height="44" alt="" />
      </div>
    </div>
    <div id="error-toast" class="error-toast hidden" role="alert"></div>
  </header>

  <!-- ── Main layout: [left+center] | [right] ────────────────────── -->
  <div class="main-layout">

    <!-- ── Left+Center block ──────────────────────────────────────── -->
    <div class="lc-block">

      <!-- Top row: left controls + cube side by side -->
      <div class="top-row">

        <!-- Left panel: 3 stacked rows -->
        <div class="left-panel card">

          <!-- Row 1: Scramble button -->
          <div class="lp-row lp-row-btn">
            <button class="scramble-btn" id="next-btn" title="New scramble" disabled>
              <div class="sbtn-scene">
                <div class="sbtn-cube" id="sbtn-cube">
                  <!-- Each face has 9 sticker divs, filled by JS -->
                  <div class="sbtn-face sbtn-f" id="sbtn-f"></div>
                  <div class="sbtn-face sbtn-b" id="sbtn-b"></div>
                  <div class="sbtn-face sbtn-r" id="sbtn-r"></div>
                  <div class="sbtn-face sbtn-l" id="sbtn-l"></div>

              </div>
            </button>
          </div>

            <div class="card-label">Scramble</div>
            <div class="scramble-text-wrap">

            </div>
          </div>

          <!-- Row 3: Visualization picker -->

            <div class="card-label">Visualize</div>

              <button class="viz-btn active" data-viz="cross">
                <span class="viz-dot viz-dot-cross"></span>

                <span class="viz-dot" style="background:#1565c0"></span>
                <span class="viz-dot" style="background:#c62828"></span>
                <span class="viz-slot">BR</span>
              </button>
              <button class="viz-btn" data-viz="red_green">
                <span class="viz-dot" style="background:#c62828"></span>
                <span class="viz-dot" style="background:#2e7d32"></span>
                <span class="viz-slot">RG</span>
              </button>
              <button class="viz-btn" data-viz="orange_green">
                <span class="viz-dot" style="background:#2e7d32"></span>
                <span class="viz-dot" style="background:#ef6c00"></span>
                <span class="viz-slot">GO</span>
              </button>
              <button class="viz-btn" data-viz="orange_blue">
                <span class="viz-dot" style="background:#ef6c00"></span>

<script>
/* ═══════════════════════════════════════════════════════════════
   Scramble-button cube — static 3D CSS cube with 6 solid faces.
   Each face shows a single color (no sticker grid needed).
   State = one color per face: {f, b, r, l, u, d}.
   ═══════════════════════════════════════════════════════════════ */

/* ─── Loading-card helpers (no animation, just status updates) ── */
const LCARD_KEYS = ['cross','red_blue','red_green','orange_green','orange_blue'];

function markLcardDone(key) {
  const card = document.getElementById(`lcard-${key}`);
  const status = document.getElementById(`lstatus-${key}`);
  if (card) card.classList.add('done');
  if (status) status.textContent = 'Ready';
}

/* ─── Scramble-button cube ───────────────────────────────────── */
/* Uses the same raw_facelets from the backend (via FACE_MAP) so the
   mini-cube always shows the exact scrambled state.
   Face id map: u/f/r/b/l/d → sbtn-u/f/r/b/l/d                   */

/* Build the 9-sticker grid inside each face div (called once on init) */
const SBTN_FACE_IDS = ['u','f','r','b','l','d'];

function sbtnBuildFaces() {
  SBTN_FACE_IDS.forEach(fid => {
    const face = document.getElementById('sbtn-' + fid);
    if (!face) return;
    face.innerHTML = '';
    for (let i = 0; i < 9; i++) {
      const s = document.createElement('div');
      s.className = 'sbtn-sticker';
      face.appendChild(s);
    }
  });
}

/* Paint the mini-cube from a raw_facelets array (54 {bg} objects).
   Uses the same FACE_MAP as the main cube — defined later in the script,
   so this is called only after FACE_MAP is available.               */
function sbtnRender(rawFacelets) {
  SBTN_FACE_IDS.forEach(fid => {
    const face = document.getElementById('sbtn-' + fid);
    if (!face) return;
    const stickers = face.querySelectorAll('.sbtn-sticker');
    const indices  = FACE_MAP[fid];
    indices.forEach((idx, i) => {
      stickers[i].style.background = rawFacelets[idx].bg;
    });
  });
}

function sbtnInit() {
  sbtnBuildFaces();
  /* Apply the same default tilt as the main cube via CSS variable */
  const cube = document.getElementById('sbtn-cube');
  if (cube) cube.style.transform =
    `rotateX(${DEFAULT_ROT.x}deg) rotateY(${DEFAULT_ROT.y}deg)`;
}

/* Called after each new scramble result arrives */
function sbtnRandomize(rawFacelets) {
  if (rawFacelets) sbtnRender(rawFacelets);
}

/* Hover / click scale handled by CSS. No-op for solving state. */
function setSbtnSolving(_on) { }

/* ═══════════════════════════════════════════════════════════════
   Main app logic
   ═══════════════════════════════════════════════════════════════ */

const FACE_MAP = {
  u: [0,1,2,  3,4,5,  6,7,8],
  f: [12,13,14,  24,25,26,  36,37,38],
  b: [20,19,18,  32,31,30,  44,43,42],
  r: [15,16,17,  27,28,29,  39,40,41],
  l: [11,10,9,   23,22,21,  35,34,33],
  d: [47,46,45,  50,49,48,  53,52,51],
};

const MV_SCRAMBLE = { U:'mv-W', D:'mv-Y', F:'mv-G', B:'mv-B', R:'mv-R', L:'mv-O' };
const MV_SOLUTION = { U:'mv-Y', D:'mv-W', F:'mv-B', B:'mv-G', R:'mv-R', L:'mv-O' };

/* ── Single source of truth for default cube orientation ── */
const DEFAULT_ROT = { x: -20, y: -25, z: 0 };

let currentViz = 'cross';
let allFacelets = null;
let selectedTs = null;

const nextBtn      = document.getElementById('next-btn');
const errorToast   = document.getElementById('error-toast');
const scrambleEl   = document.getElementById('scramble-display');
const cubeEl       = document.getElementById('cube');
const zCcw         = document.getElementById('z-ccw');
const zCw          = document.getElementById('z-cw');
const dpadReset    = document.getElementById('dpad-reset');
const datePrev     = document.getElementById('date-prev');
const dateNext     = document.getElementById('date-next');
const dateDisplay  = document.getElementById('date-display');
const datePicker   = document.getElementById('date-picker');
const historyList  = document.getElementById('history-list');
const loadingScreen = document.getElementById('loading-screen');
const appWrap      = document.getElementById('app-wrap');

const SOL_KEYS = ['cross','red_blue','red_green','orange_green','orange_blue'];

/* ─── Warmup / loading screen ────────────────────────────────── */
async function startWarmup() {

  let res;
  try {
    res = await fetch('/cubocross/api/status');
  } catch {
    document.querySelector('.loading-subtitle').textContent = 'Server offline — is the server running?';
    return;
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  const loadedKeys = new Set();

  function handleWarmupMsg(msg) {
    if (msg.type === 'status' || msg.type === 'loading') {
      const m = msg.message?.match(/^\[([^\]]+)\]\s+Table ready/);
      if (m) {
        const rawKey = m[1];
        const shortKey = rawKey.replace('xcross_', '');
        if (!loadedKeys.has(shortKey)) {
          loadedKeys.add(shortKey);
          markLcardDone(shortKey);
        }
      }
      const loaded = msg.loaded ?? loadedKeys.size;
      const total = msg.total ?? 5;
      document.querySelector('.loading-subtitle').textContent =
        `Loading pruning tables… (${loaded}/${total})`;
    } else if (msg.type === 'ready') {
      LCARD_KEYS.forEach(k => { if (!loadedKeys.has(k)) markLcardDone(k); });
      setTimeout(transitionToApp, 800);
      return true;
    } else if (msg.type === 'error') {
      document.querySelector('.loading-subtitle').textContent = 'Error: ' + (msg.error || 'Load failed');
      return true;
    }
    return false;
  }

  try {
    while (true) {
      const { value, done } = await reader.read();
      /* Final chunk is often delivered with done:true; must not skip decoding it */
      if (value) {
        buffer += decoder.decode(value, { stream: !done });
      }
      const lines = buffer.split('\n');
      buffer = lines.pop() ?? '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        let msg;
        try { msg = JSON.parse(trimmed); } catch { continue; }
        if (handleWarmupMsg(msg)) return;
      }
      if (done) break;
    }
    const tail = buffer.trim();
    if (tail) {
      try {
        const msg = JSON.parse(tail);
        if (handleWarmupMsg(msg)) return;
      } catch { /* ignore */ }
    }
  } catch (e) {
    document.querySelector('.loading-subtitle').textContent = 'Connection error';
  }
}


function transitionToApp() {
  loadingScreen.classList.add('fade-out');
  setTimeout(() => {
    loadingScreen.classList.add('hidden');
    appWrap.classList.remove('hidden');
    appWrap.classList.add('fade-in');
    nextBtn.disabled = false;
    sbtnInit();
  }, 500);
}

/* ─── Controls hint toggle ───────────────────────────────────── */
(function() {
  const hint   = document.getElementById('ctrl-hint');
  const toggle = document.getElementById('ctrl-hint-toggle');
  const STORE_KEY = 'ctrlHintCollapsed';

  /* Expanded by default for first-time users; collapsed if they've dismissed it */
  if (localStorage.getItem(STORE_KEY) === '1') hint.classList.add('collapsed');

  toggle.addEventListener('click', () => {
    const collapsed = hint.classList.toggle('collapsed');
    localStorage.setItem(STORE_KEY, collapsed ? '1' : '0');
  });
})();

/* ─── Scramble button events ─────────────────────────────────── */
// Wired after DOM ready below

/* ─── Visualization picker ───────────────────────────────────── */
function setViz(key) {
  document.querySelectorAll('.viz-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.viz-btn[data-viz="${key}"]`);
  if (btn) btn.classList.add('active');
  currentViz = key;

  document.querySelectorAll('.sol-box').forEach(b => b.classList.remove('active'));
  const box = document.getElementById(`sol-${key}`);
  if (box) box.classList.add('active');

  if (allFacelets) renderCube(allFacelets[currentViz]);
}

document.querySelectorAll('.viz-btn').forEach(btn => {
  btn.addEventListener('click', () => setViz(btn.dataset.viz));
});

/* ─── Cube rotation ──────────────────────────────────────────── */
/* ─── Rotation matrix ────────────────────────────────────────────
   We store orientation as a 3×3 column-major rotation matrix so that
   all rotations (drag, dpad, z-buttons) compose correctly in world
   space regardless of current tilt.
   ─────────────────────────────────────────────────────────────── */

/* Identity matrix */
function matI() {
  return [1,0,0, 0,1,0, 0,0,1];
}

/* Multiply two 3×3 column-major matrices: out = a * b */
function matMul(a, b) {
  const o = [];
  for (let r = 0; r < 3; r++)
    for (let c = 0; c < 3; c++)
      o[r*3+c] = a[r*3+0]*b[0*3+c] + a[r*3+1]*b[1*3+c] + a[r*3+2]*b[2*3+c];
  return o;
}

/* Elementary rotation matrices (world-space, right-hand rule) */
function matRotX(deg) {
  const r = deg * Math.PI / 180, c = Math.cos(r), s = Math.sin(r);
  return [1,0,0, 0,c,-s, 0,s,c];
}
function matRotY(deg) {
  const r = deg * Math.PI / 180, c = Math.cos(r), s = Math.sin(r);
  return [c,0,s, 0,1,0, -s,0,c];
}
function matRotZ(deg) {
  const r = deg * Math.PI / 180, c = Math.cos(r), s = Math.sin(r);
  return [c,-s,0, s,c,0, 0,0,1];
}

/* Build initial matrix from DEFAULT_ROT Euler angles (XYZ order) */
function matFromDefaultRot() {
  return matMul(matMul(matRotX(DEFAULT_ROT.x), matRotY(DEFAULT_ROT.y)), matRotZ(DEFAULT_ROT.z));
}

/* ── Quaternion helpers ───────────────────────────────────────────
   We store orientation as a unit quaternion [w,x,y,z].
   This avoids the CSS matrix3d double-cover problem: before applying
   we ensure the quaternion stays in the same hemisphere as the last
   frame so CSS always interpolates the short way around.
   ─────────────────────────────────────────────────────────────── */

function quatNorm(q) {
  const n = Math.hypot(...q);
  return q.map(v => v/n);
}

/* Quaternion from a rotation matrix (row-major 3×3) */
function quatFromMat(m) {
  const [m00,m01,m02, m10,m11,m12, m20,m21,m22] = m;
  const tr = m00+m11+m22;
  let w,x,y,z;
  if (tr > 0) {
    const s = 0.5/Math.sqrt(tr+1);
    w=0.25/s; x=(m21-m12)*s; y=(m02-m20)*s; z=(m10-m01)*s;
  } else if (m00>m11 && m00>m22) {
    const s = 2*Math.sqrt(1+m00-m11-m22);
    w=(m21-m12)/s; x=0.25*s; y=(m01+m10)/s; z=(m02+m20)/s;
  } else if (m11>m22) {
    const s = 2*Math.sqrt(1+m11-m00-m22);
    w=(m02-m20)/s; x=(m01+m10)/s; y=0.25*s; z=(m12+m21)/s;
  } else {
    const s = 2*Math.sqrt(1+m22-m00-m11);
    w=(m10-m01)/s; x=(m02+m20)/s; y=(m12+m21)/s; z=0.25*s;
  }
  return quatNorm([w,x,y,z]);
}

/* Quaternion multiplication: p * q */
function quatMul(p, q) {
  const [pw,px,py,pz] = p, [qw,qx,qy,qz] = q;
  return quatNorm([
    pw*qw - px*qx - py*qy - pz*qz,
    pw*qx + px*qw + py*qz - pz*qy,
    pw*qy - px*qz + py*qw + pz*qx,
    pw*qz + px*qy - py*qx + pz*qw,
  ]);
}

/* Quaternion from axis-angle (axis must be unit vector) */
function quatFromAxisAngle(ax, ay, az, deg) {
  const r = deg * Math.PI / 360;  /* half angle */
  const s = Math.sin(r);
  return [Math.cos(r), ax*s, ay*s, az*s];
}

/* Convert quaternion to row-major 3×3 matrix */
function quatToMat(q) {
  const [w,x,y,z] = q;
  return [
    1-2*(y*y+z*z),   2*(x*y-w*z),   2*(x*z+w*y),
      2*(x*y+w*z), 1-2*(x*x+z*z),   2*(y*z-w*x),
      2*(x*z-w*y),   2*(y*z+w*x), 1-2*(x*x+y*y),
  ];
}

/* ── Quaternion slerp animator ───────────────────────────────────
   We own the animation loop so we always take the shortest arc.
   ─────────────────────────────────────────────────────────────── */

function quatSlerp(a, b, t) {
  let dot = a[0]*b[0]+a[1]*b[1]+a[2]*b[2]+a[3]*b[3];
  /* Always take the short arc */
  const b2 = dot < 0 ? b.map(v => -v) : b;
  dot = Math.abs(dot);
  if (dot > 0.9999) {
    /* Quaternions nearly identical — linear interpolation is fine */
    return quatNorm(a.map((v,i) => v + t*(b2[i]-v)));
  }
  const theta0 = Math.acos(dot);
  const theta  = theta0 * t;
  const s0 = Math.cos(theta) - dot * Math.sin(theta) / Math.sin(theta0);
  const s1 = Math.sin(theta) / Math.sin(theta0);
  return a.map((v,i) => s0*v + s1*b2[i]);
}

/* Current orientation (what the cube is animating toward) */
let rotQuat    = quatFromMat(matFromDefaultRot());
/* What's currently rendered */
let renderQuat = [...rotQuat];

let animRaf = null;
const ANIM_MS = 300;   /* match --transition duration */

function setQuatTransform(q) {
  const m = quatToMat(q);
  cubeEl.style.transform =
    `matrix3d(${m[0]},${m[3]},${m[6]},0, ${m[1]},${m[4]},${m[7]},0, ${m[2]},${m[5]},${m[8]},0, 0,0,0,1)`;
}

function animateTo(target) {
  if (animRaf) cancelAnimationFrame(animRaf);
  const start    = [...renderQuat];
  const t0       = performance.now();

  function frame(now) {
    const t = Math.min((now - t0) / ANIM_MS, 1);
    /* Ease in-out cubic */
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    renderQuat = quatSlerp(start, target, e);
    setQuatTransform(renderQuat);
    if (t < 1) animRaf = requestAnimationFrame(frame);
    else { renderQuat = target; animRaf = null; }
  }
  animRaf = requestAnimationFrame(frame);
}

/* Post-multiply: rotate around the cube's current local axes */
function rotateLocal(mat) {
  rotQuat = quatMul(rotQuat, quatFromMat(mat));
}

function applyCubeTransform() {
  animateTo(rotQuat);
}

/* Drag: update live without animation */
function applyDragTransform() {
  renderQuat = [...rotQuat];
  setQuatTransform(renderQuat);
}

function resetRot() {
  rotQuat = quatFromMat(matFromDefaultRot());
  applyCubeTransform();
}

document.querySelectorAll('.dpad-btn[data-rot]').forEach(btn => {

    if (r === 'x-') rotateLocal(matRotX(-90));
    if (r === 'x+') rotateLocal(matRotX( 90));
    if (r === 'y-') rotateLocal(matRotY( 90));
    if (r === 'y+') rotateLocal(matRotY(-90));
    applyCubeTransform();
  });
});

/* ─── Drag to rotate (mouse + touch) ────────────────────────── */
{
  let dragging = false, lastX = 0, lastY = 0;
  const scene = cubeEl.closest('.cube-scene') || cubeEl.parentElement;

  /* Mouse */
  scene.addEventListener('mousedown', e => {
    dragging = true; lastX = e.clientX; lastY = e.clientY;
    scene.style.cursor = 'grabbing';
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    rotateLocal(matRotY( dx * 0.4));
    rotateLocal(matRotX(-dy * 0.4));
    applyDragTransform();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    scene.style.cursor = 'grab';
  });
  scene.style.cursor = 'grab';

  /* Touch */
  scene.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    dragging = true;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });
  scene.addEventListener('touchmove', e => {
    if (!dragging || e.touches.length !== 1) return;
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
    rotateLocal(matRotY( dx * 0.5));
    rotateLocal(matRotX(-dy * 0.5));
    applyDragTransform();
    e.preventDefault();
  }, { passive: false });
  scene.addEventListener('touchend', () => { dragging = false; });
}

document.addEventListener('keydown', e => {

  switch (e.key) {

    case ' ':          e.preventDefault(); resetRot(); break;

/* ─── Render main cube ───────────────────────────────────────── */
function renderCube(facelets) {
  for (const [faceId, indices] of Object.entries(FACE_MAP)) {
    const faceEl  = document.getElementById('face-' + faceId);
    const hintEl  = document.getElementById('hint-' + faceId);
    faceEl.innerHTML = '';
    if (hintEl) hintEl.innerHTML = '';
    for (const idx of indices) {
      const bg = facelets[idx].bg;
      const isHi = bg !== '#555555';

      const s = document.createElement('div');
      s.className = 'sticker' + (isHi ? ' hi' : '');
      s.style.background = bg;
      faceEl.appendChild(s);

      if (hintEl) {
        const h = document.createElement('div');
        h.className = 'sticker';
        h.style.background = bg;
        hintEl.appendChild(h);
      }
    }
  }
}

/* ─── Render move sequence ───────────────────────────────────── */
function renderMoves(str, mvClass) {
  if (!str || str === '(already solved)') return `<span class="mv-rot">${str || ''}</span>`;
  return str.split(' ').map(tok => {
    const cls = mvClass[tok[0]] || 'mv-rot';

  }).join(' ');
}

/* ─── Reset / populate solution boxes ───────────────────────── */
function resetSolBoxes() {
  for (const key of SOL_KEYS) {
    document.getElementById(`htm-${key}`).textContent = '';
    const revBtn = document.getElementById(`reveal-${key}`);
    revBtn.disabled = true;
    revBtn.textContent = 'Reveal';

function populateSolBoxes(results) {
  for (const key of SOL_KEYS) {
    const r = results[key];
    const htmEl = document.getElementById(`htm-${key}`);

/* ─── Display a history entry ────────────────────────────────── */
async function displayEntry(entry) {
  scrambleEl.innerHTML = renderMoves(entry.scramble, MV_SCRAMBLE);
  allFacelets = entry.all_facelets || null;
  if (allFacelets) renderCube(allFacelets[currentViz]);
  populateSolBoxes(entry.results);
  resetRot();

  if (entry.raw_facelets) {
    sbtnRandomize(entry.raw_facelets);
  } else {
    /* Old entry — fetch from backend and backfill into localStorage */
    try {
      const res = await fetch('/cubocross/api/facelets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scramble: entry.scramble }),
      });
      const data = await res.json();
      if (data.raw_facelets) {
        sbtnRandomize(data.raw_facelets);
        /* Backfill so we don't fetch again */
        const h = loadHistory();
        const idx = h.findIndex(e => e.ts === entry.ts);
        if (idx !== -1) { h[idx].raw_facelets = data.raw_facelets; saveHistory(h); }
      }
    } catch (_) { /* silently skip if offline */ }
  }
}

/* ─── Load session from server ───────────────────────────────── */
async function loadSession() {
  clearError();
  resetSolBoxes();
  allFacelets = null;
  nextBtn.disabled = true;
  setSbtnSolving(true);
  resetRot();

  let res;
  try {
    res = await fetch('/cubocross/api/session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
  } catch (e) {
    showError('Network error — is the server running?');
    nextBtn.disabled = false;
    setSbtnSolving(false);
    return;
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  function applySessionResult(msg) {
    scrambleEl.innerHTML = renderMoves(msg.scramble_display, MV_SCRAMBLE);
    allFacelets = msg.all_facelets;
    renderCube(allFacelets[currentViz]);
    populateSolBoxes(msg.results);
    const ts = saveToHistory(msg.scramble_display, msg.results, msg.all_facelets, msg.raw_facelets);
    setSelectedEntry(ts);
    sbtnRandomize(msg.raw_facelets);
    nextBtn.disabled = false;
    setSbtnSolving(false);
  }

  try {
    while (true) {
      const { value, done } = await reader.read();
      if (value) {
        buffer += decoder.decode(value, { stream: !done });
      }
      const lines = buffer.split('\n');
      buffer = lines.pop() ?? '';

      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        let msg;
        try { msg = JSON.parse(trimmed); } catch { continue; }

        if (msg.type === 'error') {
          showError(msg.error || 'Request failed');
          nextBtn.disabled = false;
          setSbtnSolving(false);
          return;
        }
        if (msg.type === 'result') {
          applySessionResult(msg);
        }
      }
      if (done) break;
    }
    const tail = buffer.trim();
    if (tail) {
      try {
        const msg = JSON.parse(tail);
        if (msg.type === 'error') {
          showError(msg.error || 'Request failed');
          nextBtn.disabled = false;
          setSbtnSolving(false);
        } else if (msg.type === 'result') {
          applySessionResult(msg);
        }
      } catch { /* ignore */ }
    }
  } catch (e) {
    showError('Stream error — ' + e.message);
    nextBtn.disabled = false;
    setSbtnSolving(false);
  }
}

/* ─── History ────────────────────────────────────────────────── */
function todayStr() { return new Date().toISOString().slice(0, 10); }
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('crosstrainer_history') || '[]'); }
  catch { return []; }
}
function saveHistory(h) { localStorage.setItem('crosstrainer_history', JSON.stringify(h)); }

let viewDate = todayStr();

function saveToHistory(scramble, results, all_facelets, raw_facelets) {
  const h = loadHistory();
  const ts = Date.now();
  h.unshift({ ts, date: todayStr(), scramble, results, all_facelets, raw_facelets });
  saveHistory(h);
  if (viewDate === todayStr()) renderHistory(viewDate);
  return ts;
}

function deleteHistoryEntry(ts) {
  if (selectedTs === ts) selectedTs = null;
  saveHistory(loadHistory().filter(e => e.ts !== ts));
  renderHistory(viewDate);
}

function getAvailableDates() {
  return [...new Set(loadHistory().map(e => e.date))].sort().reverse();
}

function setSelectedEntry(ts) {
  selectedTs = ts;
  document.querySelectorAll('.history-entry').forEach(el => {
    el.classList.toggle('selected', Number(el.dataset.ts) === ts);
  });
}

function histDots(key) {
  if (key === 'cross') return `<span class="hdot hdot-cross"></span>`;
  const colors = {
    red_blue:    ['#1565c0','#c62828'],
    red_green:   ['#c62828','#2e7d32'],
    orange_green:['#2e7d32','#ef6c00'],
    orange_blue: ['#ef6c00','#1565c0'],
  }[key];
  return colors.map(c => `<span class="hdot" style="background:${c}"></span>`).join('');
}

function renderHistory(date) {
  const history = loadHistory().filter(e => e.date === date);
  const today = todayStr();

  dateDisplay.textContent = date === today
    ? 'Today'
    : new Date(date + 'T12:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });

  const dates = getAvailableDates();
  const idx = dates.indexOf(date);
  datePrev.disabled = idx >= dates.length - 1;
  dateNext.disabled = date >= today;

  if (history.length === 0) {
    historyList.innerHTML = '<div class="history-empty">No sessions on this date.</div>';
    return;
  }

  historyList.innerHTML = history.map(entry => {
    const time = new Date(entry.ts).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
    const cells = SOL_KEYS.map(k => {
      const r = entry.results[k];
      const val = r && r.htm !== null ? r.htm : '?';
      return `<div class="hcell">
        <div class="hcell-dots">${histDots(k)}</div>
        <div class="hcell-htm">${val}</div>
      </div>`;
    }).join('');
    const sel = entry.ts === selectedTs ? ' selected' : '';

    return `<div class="history-entry${sel}" data-ts="${entry.ts}">
      <div class="hist-top">
        <span class="hist-time">${time}</span>
        <button class="hist-del" data-ts="${entry.ts}" title="Delete">×</button>
      </div>
      <div class="hist-cells">${cells}</div>
    </div>`;
  }).join('');

  historyList.querySelectorAll('.history-entry').forEach(el => {
    el.addEventListener('click', () => {
      const ts = Number(el.dataset.ts);
      const entry = loadHistory().find(e => e.ts === ts);
      if (!entry) return;
      displayEntry(entry);
      setSelectedEntry(ts);
    });
  });

  historyList.querySelectorAll('.hist-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      deleteHistoryEntry(Number(btn.dataset.ts));
    });
  });
}

const dateDialog       = document.getElementById('date-dialog');
const dateDialogTitle  = document.getElementById('date-dialog-title');
const dateDialogGrid   = document.getElementById('date-dialog-grid');
const dateDialogPrevMo = document.getElementById('date-dialog-prev-mo');
const dateDialogNextMo = document.getElementById('date-dialog-next-mo');
const dateDialogToday  = document.getElementById('date-dialog-today');
const dateDialogClose  = document.getElementById('date-dialog-close');
const dateDialogHead   = document.getElementById('date-dialog-head');

let pickerY;
let pickerM; /* 0–11 */

let dateDlgDrag = null;

function centerDateDialog() {
  if (!dateDialog.open) return;
  const pad = 12;
  const w = dateDialog.offsetWidth;
  const h = dateDialog.offsetHeight;
  if (!w || !h) return;
  let x = (window.innerWidth - w) / 2;
  let y = (window.innerHeight - h) / 2;
  x = Math.max(pad, Math.min(x, window.innerWidth - w - pad));
  y = Math.max(pad, Math.min(y, window.innerHeight - h - pad));
  dateDialog.style.left = `${Math.round(x)}px`;
  dateDialog.style.top = `${Math.round(y)}px`;
}

dateDialogHead.addEventListener('pointerdown', (e) => {
  if (!dateDialog.open || e.button !== 0) return;
  if (e.target.closest('button')) return;
  const r = dateDialog.getBoundingClientRect();
  dateDlgDrag = {
    id: e.pointerId,
    sx: e.clientX,
    sy: e.clientY,
    ox: r.left,
    oy: r.top,
  };
  dateDialogHead.style.cursor = 'grabbing';
  try {
    dateDialogHead.setPointerCapture(e.pointerId);
  } catch (_) { /* noop */ }
  e.preventDefault();
});

dateDialogHead.addEventListener('pointermove', (e) => {
  if (!dateDlgDrag || dateDlgDrag.id !== e.pointerId) return;
  const dx = e.clientX - dateDlgDrag.sx;
  const dy = e.clientY - dateDlgDrag.sy;
  let x = dateDlgDrag.ox + dx;
  let y = dateDlgDrag.oy + dy;
  const pad = 8;
  const w = dateDialog.offsetWidth;
  const h = dateDialog.offsetHeight;
  x = Math.max(pad, Math.min(x, window.innerWidth - w - pad));
  y = Math.max(pad, Math.min(y, window.innerHeight - h - pad));
  dateDialog.style.left = `${Math.round(x)}px`;
  dateDialog.style.top = `${Math.round(y)}px`;
});

function dateDlgEndDrag(e) {
  if (!dateDlgDrag || dateDlgDrag.id !== e.pointerId) return;
  dateDlgDrag = null;
  dateDialogHead.style.cursor = '';
  try {
    dateDialogHead.releasePointerCapture(e.pointerId);
  } catch (_) { /* noop */ }
}

dateDialogHead.addEventListener('pointerup', dateDlgEndDrag);
dateDialogHead.addEventListener('pointercancel', dateDlgEndDrag);

dateDialog.addEventListener('close', () => {
  dateDlgDrag = null;
  dateDialogHead.style.cursor = '';
});

function pad2(n) { return String(n).padStart(2, '0'); }
function toISODate(y, month1to12, d) {
  return `${y}-${pad2(month1to12)}-${pad2(d)}`;
}

function pickerCanGoNextMonth() {
  const t = todayStr().split('-').map(Number);
  return pickerY < t[0] || (pickerY === t[0] && pickerM < t[1] - 1);
}

function renderPickerMonth() {
  const today = todayStr();
  dateDialogTitle.textContent = new Date(pickerY, pickerM, 1).toLocaleDateString('en-US', {
    month: 'long',
    year: 'numeric',
  });
  dateDialogNextMo.disabled = !pickerCanGoNextMonth();

  const first = new Date(pickerY, pickerM, 1);
  const startDow = first.getDay();
  const dim = new Date(pickerY, pickerM + 1, 0).getDate();

  dateDialogGrid.innerHTML = '';
  const frag = document.createDocumentFragment();

  for (let i = 0; i < startDow; i++) {
    const el = document.createElement('span');
    el.className = 'date-dialog-pad';
    frag.appendChild(el);
  }

  for (let d = 1; d <= dim; d++) {
    const iso = toISODate(pickerY, pickerM + 1, d);
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'date-dialog-cell';
    b.textContent = String(d);
    const isFuture = iso > today;
    if (isFuture) b.disabled = true;
    if (iso === viewDate) b.classList.add('date-dialog-cell--selected');
    b.addEventListener('click', () => {
      if (isFuture) return;
      viewDate = iso;
      datePicker.value = iso;
      renderHistory(viewDate);
      dateDialog.close();
    });
    frag.appendChild(b);
  }

  let total = startDow + dim;
  while (total % 7 !== 0) {
    const el = document.createElement('span');
    el.className = 'date-dialog-pad';
    frag.appendChild(el);
    total++;
  }
  dateDialogGrid.appendChild(frag);
}

function openDatePicker() {
  const parts = viewDate.split('-').map(Number);
  pickerY = parts[0];
  pickerM = parts[1] - 1;
  renderPickerMonth();
  dateDialog.showModal();
  requestAnimationFrame(() => {
    requestAnimationFrame(centerDateDialog);
  });
}

dateDisplay.addEventListener('click', (e) => {
  e.preventDefault();
  openDatePicker();
});

dateDialogPrevMo.addEventListener('click', () => {
  pickerM--;
  if (pickerM < 0) {
    pickerM = 11;
    pickerY--;
  }
  renderPickerMonth();
});

dateDialogNextMo.addEventListener('click', () => {
  if (!pickerCanGoNextMonth()) return;
  pickerM++;
  if (pickerM > 11) {
    pickerM = 0;
    pickerY++;
  }
  renderPickerMonth();
});

dateDialogToday.addEventListener('click', () => {

dateDialogClose.addEventListener('click', () => dateDialog.close());

datePicker.addEventListener('change', () => {
  if (datePicker.value) {
    viewDate = datePicker.value;
    renderHistory(viewDate);
  }
});

/* ─── Mobile: collapsible history panel ─────────────────────── */
(function() {
  const panel  = document.querySelector('.history-panel');
  const header = document.querySelector('.history-header');
  if (!panel || !header) return;
  const STORE_KEY = 'historyCollapsed';

  function isMobile() { return window.innerWidth <= 899; }

  function applyCollapse() {
    if (!isMobile()) { panel.classList.remove('collapsed'); return; }
    if (localStorage.getItem(STORE_KEY) === '1') panel.classList.add('collapsed');
  }

  header.addEventListener('click', (e) => {
    if (!isMobile()) return;
    /* Date controls live inside the header row — don’t treat those taps as collapse */
    if (e.target.closest('.date-nav')) return;
    const collapsed = panel.classList.toggle('collapsed');
    localStorage.setItem(STORE_KEY, collapsed ? '1' : '0');
  });

  applyCollapse();
  window.addEventListener('resize', applyCollapse);
})();

/* ─── Init ───────────────────────────────────────────────────── */
nextBtn.addEventListener('click', loadSession);

applyCubeTransform();
setViz('cross');
renderHistory(viewDate);
startWarmup();
</script>
